<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>金融数学 研究コックピット</title>

<!-- アイコン -->
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
<link rel="apple-touch-icon" sizes="180x180" href="icon-180.png" />
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png" />

<!-- KaTeX -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" />
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>

<!-- Supabase JS v2 -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<link rel="stylesheet" href="style.css" />
</head>
<body>

<header class="app-header">
  <h1>📐 金融数学 研究コックピット</h1>
  <div class="status">
    <span id="status-dot"></span><span id="status-label">接続待機中...</span>
    <div class="online-users-widget">
      <button id="online-users-btn" class="link-btn" title="接続中のメンバーを表示">
        接続者 <span id="online-count">0</span>人
      </button>
      <div id="online-users-panel" class="dropdown-panel hidden">
        <h3>接続中のメンバー</h3>
        <ul id="online-users-list"></ul>
      </div>
    </div>
    <span class="username-widget">
      名前: <span id="username-label"></span>
      <button id="username-edit-btn" class="link-btn" title="表示名を変更">変更</button>
    </span>
    <span id="admin-badge" class="admin-badge hidden">
      管理者モード
      <span class="admin-trash-widget">
        <button id="admin-trash-btn" class="link-btn hidden" title="ゴミ箱を表示">ゴミ箱</button>
        <div id="admin-trash-panel" class="dropdown-panel hidden">
          <div class="trash-panel-header">
            <h3>ゴミ箱（削除済み・復元可）</h3>
            <button id="admin-trash-restore-all-btn" class="link-btn">全て復元</button>
          </div>
          <ul id="admin-trash-list"></ul>
        </div>
      </span>
      <button id="admin-exit-btn" class="link-btn" title="管理者モードを終了">終了</button>
    </span>
  </div>
</header>

<!-- ① 画面上部：チームチャットエリア -->
<section id="chat-area">
  <div class="chat-header-row">
    <h2>チームチャット</h2>
    <button id="chat-clear-all-btn" class="link-btn hidden" title="チャットを全消去（管理者）">全消去</button>
  </div>
  <div id="chat-messages"></div>
  <form id="chat-form">
    <input type="text" id="chat-input" placeholder="メッセージを入力..." autocomplete="off" required />
    <button type="submit" class="primary-btn">送信</button>
  </form>
</section>

<main id="main-split">

  <!-- ② 画面左側：公式検索・登録・コピペエリア -->
  <section id="formula-panel" class="panel">
    <h2>公式ライブラリ</h2>

    <details id="add-formula">
      <summary>+ 新しい公式を登録</summary>
      <form id="formula-form">
        <input type="text" id="formula-name" placeholder="公式名" required autocomplete="off" />
        <p id="formula-duplicate-warning" class="duplicate-warning hidden"></p>
        <textarea id="formula-latex" rows="2" placeholder="LaTeXコード（$や$$は自動的に除去されます）" required></textarea>
        <input type="text" id="formula-category" placeholder="カテゴリ（例: 確率過程）" />
        <button type="submit" class="primary-btn">登録</button>
      </form>
    </details>

    <input type="text" id="formula-search" placeholder="公式名・数式・カテゴリで検索..." />
    <label class="copy-mode-toggle">
      <input type="checkbox" id="copy-mode-sheet" />
      スプレッドシート貼り付けモード（先頭に ' を付与）
    </label>
    <div id="formula-list"></div>
  </section>

  <!-- ③ 画面右側：作業ログ入力 ＆ リアルタイムプレビュー -->
  <section id="editor-panel">
    <div id="editor-split">
      <div class="editor-half">
        <div class="editor-toolbar">
          <span class="meta" id="draft-meta">最終更新: -</span>
          <button id="save-log-btn" class="primary-btn">ログとして保存</button>
        </div>
        <textarea id="log-input" placeholder="ここに作業ログや数式（$...$ / $$...$$）を入力..."></textarea>
      </div>
      <div class="editor-half">
        <div class="editor-toolbar"><span class="meta">プレビュー</span></div>
        <div id="preview-pane"></div>
      </div>
    </div>

    <details id="log-history">
      <summary>研究ログ履歴（保存済み）</summary>
      <div id="log-history-list"></div>
    </details>
  </section>

</main>

<!-- タスク管理エリア（画面下部） -->
<section id="task-area">
  <h2>タスク管理</h2>
  <form id="task-form">
    <input type="text" id="task-title" placeholder="タスク名" required />
    <input type="text" id="task-assignee" placeholder="担当者" />
    <button type="submit" class="primary-btn">追加</button>
  </form>
  <table id="task-table">
    <thead>
      <tr><th>タスク名</th><th>担当者</th><th>ステータス</th><th></th></tr>
    </thead>
    <tbody></tbody>
  </table>
</section>

<!-- 汎用確認モーダル（OK / いいえ）。削除系の操作すべてで共用 -->
<div id="confirm-modal-overlay" class="modal-overlay hidden">
  <div class="modal-box">
    <p id="confirm-modal-message"></p>
    <div class="modal-actions">
      <button id="confirm-modal-cancel" class="secondary-btn">いいえ</button>
      <button id="confirm-modal-ok" class="primary-btn">OK</button>
    </div>
  </div>
</div>

<!-- 入室ゲート：名前を入力するまでアプリを操作できない -->
<div id="entry-gate-overlay" class="modal-overlay">
  <div class="modal-box">
    <h2 style="margin:0 0 8px;font-size:16px;">ようこそ</h2>
    <p>お名前を入力して入室してください。同じ名前で入室すると、同一人物として扱われます。</p>
    <input type="text" id="entry-name-input" placeholder="お名前" maxlength="20" autocomplete="off" />
    <div class="modal-actions">
      <button id="entry-submit-btn" class="primary-btn">入室する</button>
    </div>
  </div>
</div>

<script defer src="config.js"></script>
<script defer src="app.js"></script>
</body>
</html>
