<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>管理者ログイン - 金融数学 研究コックピット</title>
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
<link rel="apple-touch-icon" sizes="180x180" href="icon-180.png" />
<link rel="stylesheet" href="style.css" />
<style>
  body { align-items: center; justify-content: center; }
  .admin-login-box {
    background: var(--panel-alt);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 28px 32px;
    max-width: 340px;
    width: 90%;
  }
  .admin-login-box h1 { font-size: 16px; margin: 0 0 8px; }
  .admin-login-box p { font-size: 13px; color: var(--text-dim); margin: 0 0 16px; }
  .admin-login-box input { width: 100%; margin-bottom: 10px; }
  .admin-login-box button { width: 100%; }
  #admin-login-error {
    color: var(--danger);
    font-size: 12px;
    margin: -4px 0 10px;
    display: none;
  }
</style>
</head>
<body>

<div class="admin-login-box">
  <h1>🔐 管理者ログイン</h1>
  <p>パスワードを入力してください。認証するとチャットメッセージの個別削除ができるようになります。</p>
  <form id="admin-login-form">
    <input type="password" id="admin-password-input" placeholder="パスワード" autocomplete="off" required />
    <p id="admin-login-error">パスワードが違います。</p>
    <button type="submit" class="primary-btn">ログイン</button>
  </form>
</div>

<script>
  const ADMIN_PASSWORD = "23042";
  const form = document.getElementById("admin-login-form");
  const input = document.getElementById("admin-password-input");
  const errorEl = document.getElementById("admin-login-error");

  form.addEventListener("submit", (e) => {
    e.preventDefault();
    if (input.value === ADMIN_PASSWORD) {
      localStorage.setItem("cockpit_is_admin", "1");
      location.href = "index.html";
    } else {
      errorEl.style.display = "block";
      input.value = "";
      input.focus();
    }
  });
</script>
</body>
</html>
